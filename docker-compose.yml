version: '3.9'
services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on: [nextjs]
    restart: always

  nextjs:
    build: .
    expose: ["3000"]
    restart: always
    environment:
      - NODE_ENV=production