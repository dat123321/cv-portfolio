services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on: [nextjs]
    restart: always

  nextjs:
    build: .
    expose: ["3000"]
    restart: always
    env_file:
      - .env.local
    environment:
      - NODE_ENV=production
    volumes:
      - ./src/data/portfolio.json:/app/src/data/portfolio.json